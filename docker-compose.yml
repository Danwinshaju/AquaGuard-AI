services:
  mongodb:
    image: mongo:8.0
    container_name: aquaguard-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - aquaguard-mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  aquaguard-mongodb-data:

